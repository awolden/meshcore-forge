name: Build Cross-Platform

on:
  # Trigger on version tags for releases
  push:
    tags:
      - 'v*'
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest  
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build || npx vite build

      - name: Bundle resources
        run: npm run bundle-resources

      - name: Create self-signed certificate (macOS)
        if: matrix.platform == 'mac'
        run: |
          # Create a temporary keychain
          security create-keychain -p "temppass" $RUNNER_TEMP/build.keychain
          security default-keychain -s $RUNNER_TEMP/build.keychain
          security unlock-keychain -p "temppass" $RUNNER_TEMP/build.keychain
          security set-keychain-settings -t 3600 -u $RUNNER_TEMP/build.keychain
          
          # Create self-signed certificate
          security create-certificate \
            -c "MeshCore Forge Certificate" \
            -C "com.meshcore.forge" \
            -t 1 \
            -k $RUNNER_TEMP/build.keychain
            
          # Trust the certificate for code signing
          security set-key-partition-list -S apple-tool:,apple: -s -k "temppass" $RUNNER_TEMP/build.keychain

      - name: Build Electron app
        run: npm run build-${{ matrix.platform }} --publish=never
        env:
          # Disable auto-publishing
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
          CI: "false"

      - name: Clean up keychain (macOS)
        if: always() && matrix.platform == 'mac'
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true

      - name: List build outputs (debug)
        run: ls -la build/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            build/*.dmg
            build/*.exe
            build/*.AppImage
            build/*.deb
            build/*.rpm
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.dmg
            **/*.exe  
            **/*.AppImage
            **/*.deb
            **/*.rpm
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}